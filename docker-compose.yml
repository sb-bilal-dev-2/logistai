# Zero-config local run: `docker compose up --build`
# Applies migrations, seeds trucks, then runs the live generate+match loop on a
# persistent SQLite volume. No API key, no database setup required.
services:
  app:
    build: .
    environment:
      DATABASE_URL: sqlite:////data/logistai.db
      # Faster cadence so you see activity quickly when running locally.
      REQUEST_MIN_INTERVAL_SECONDS: 5
      REQUEST_MAX_INTERVAL_SECONDS: 15
      # This base stack has no LLM server, so keep it geo-only. Use the
      # docker-compose.ollama.yml overlay to enable the local LLM re-rank.
      LLM_PROVIDER: none
    volumes:
      - logistai-data:/data
    restart: unless-stopped

volumes:
  logistai-data:
