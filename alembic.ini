# Alembic configuration for LogistAI.
# The DB URL is injected from app.config at runtime (see alembic/env.py),
# so the sqlalchemy.url below is only a placeholder.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///logistai.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
